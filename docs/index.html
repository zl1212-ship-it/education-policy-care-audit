<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education Policy — Federal Funding Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 20px; }
.header { max-width: 1400px; margin: 0 auto 20px; }
.header h1 { font-size: 1.6rem; color: #16213e; }
.header p { color: #666; font-size: 0.9rem; margin-top: 4px; }
.status-bar { display: flex; gap: 20px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
.status-item { font-size: 0.85rem; color: #444; background: #fff; padding: 6px 14px; border-radius: 6px; border: 1px solid #e0e0e0; }
.status-item .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.dot-green { background: #22c55e; }
.dot-yellow { background: #eab308; }
.dot-red { background: #ef4444; }
.controls { max-width: 1400px; margin: 0 auto 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.controls input, .controls select { padding: 8px 12px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 0.85rem; background: #fff; }
.controls input { width: 260px; }
.controls button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; background: #16213e; color: #fff; }
.controls button:hover { background: #1a3a5c; }
.stats { max-width: 1400px; margin: 0 auto 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.stat-card { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #e0e0e0; }
.stat-card .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 1.4rem; font-weight: 700; color: #16213e; margin-top: 4px; }
.table-wrap { max-width: 1400px; margin: 0 auto; overflow-x: auto; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead th { background: #16213e; color: #fff; padding: 12px 14px; text-align: left; position: sticky; top: 0; cursor: pointer; white-space: nowrap; user-select: none; }
thead th:hover { background: #1a3a5c; }
thead th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }
tbody td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
tbody tr:hover { background: #f8fafc; }
.num { text-align: right; font-variant-numeric: tabular-nums; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
.tag-us { background: #dbeafe; color: #1e40af; }
.funding-bar { display: inline-block; height: 6px; border-radius: 3px; background: #3b82f6; vertical-align: middle; margin-right: 8px; }
.loading { text-align: center; padding: 60px; color: #888; font-size: 1.1rem; }
.error { text-align: center; padding: 60px; color: #ef4444; font-size: 1rem; }
.footer { max-width: 1400px; margin: 16px auto 0; font-size: 0.8rem; color: #999; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <h1>Education Policy — Federal Funding Dashboard</h1>
  <p>Real-time data from <a href="https://api.usaspending.gov" target="_blank">USASpending.gov API</a> | Source: <a href="https://github.com/zl1212-ship-it/education-policy-care-audit" target="_blank">GitHub Repo</a></p>
  <div class="status-bar">
    <span class="status-item" id="status"><span class="dot dot-yellow"></span>Loading...</span>
    <span class="status-item" id="row-count">—</span>
    <span class="status-item" id="last-update">—</span>
    <span class="status-item">Auto-refresh: 1h</span>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <input type="text" id="search" placeholder="Search institution...">
  <select id="filter-year">
    <option value="">All Fiscal Years</option>
  </select>
  <button onclick="fetchData()">Refresh Now</button>
</div>

<div class="table-wrap">
  <div class="loading" id="loading">Loading data from GitHub...</div>
  <table id="data-table" style="display:none">
    <thead>
      <tr id="header-row"></tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div class="error" id="error" style="display:none"></div>
</div>

<div class="footer" id="footer"></div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/zl1212-ship-it/education-policy-care-audit/main/governance_matrix.csv';
const REFRESH_MS = 60 * 60 * 1000;

let allRows = [];
let headers = [];
let sortCol = -1;
let sortAsc = true;
let maxFunding = 0;

const COLUMN_CONFIG = {
  'institution':           { label: 'Institution',       format: v => v },
  'country':               { label: 'Country',           format: v => `<span class="tag tag-us">${v}</span>` },
  'fiscal_year':           { label: 'Fiscal Year',       cls: 'num', format: v => 'FY' + v },
  'federal_funding_total': { label: 'Federal Funding ($)', cls: 'num', format: (v, row) => {
    const n = Number(v);
    const pct = maxFunding > 0 ? (n / maxFunding * 100) : 0;
    const barW = Math.max(pct * 0.8, 2);
    return `<span class="funding-bar" style="width:${barW}px"></span>$${n.toLocaleString('en-US', {maximumFractionDigits: 0})}`;
  }},
  'award_count':           { label: 'Awards',            cls: 'num', format: v => v },
  'top_awarding_agency':   { label: 'Top Agency',        format: v => v === 'N/A' ? '—' : v },
};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const hdrs = parseCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i]);
    if (vals.length === hdrs.length) {
      const row = {};
      hdrs.forEach((h, j) => row[h] = vals[j]);
      rows.push(row);
    }
  }
  return { headers: hdrs, rows };
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { result.push(current.trim()); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current.trim());
  return result;
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const year = document.getElementById('filter-year').value;
  return allRows.filter(r => {
    if (search && !(r.institution || '').toLowerCase().includes(search)) return false;
    if (year && r.fiscal_year !== year) return false;
    return true;
  });
}

function renderStats(rows) {
  const totalFunding = rows.reduce((s, r) => s + Number(r.federal_funding_total || 0), 0);
  const totalAwards = rows.reduce((s, r) => s + Number(r.award_count || 0), 0);
  const institutions = new Set(rows.map(r => r.institution)).size;
  const years = new Set(rows.map(r => r.fiscal_year));
  const yearRange = [...years].sort();

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">Total Federal Funding</div><div class="value">$${(totalFunding/1e9).toFixed(2)}B</div></div>
    <div class="stat-card"><div class="label">Total Awards</div><div class="value">${totalAwards.toLocaleString()}</div></div>
    <div class="stat-card"><div class="label">Institutions</div><div class="value">${institutions}</div></div>
    <div class="stat-card"><div class="label">Fiscal Years</div><div class="value">${yearRange[0]}–${yearRange[yearRange.length-1]}</div></div>
  `;
}

function renderTable(rows) {
  maxFunding = Math.max(...rows.map(r => Number(r.federal_funding_total || 0)));

  const headerRow = document.getElementById('header-row');
  headerRow.innerHTML = '';
  headers.forEach((h, i) => {
    const cfg = COLUMN_CONFIG[h] || { label: h };
    const th = document.createElement('th');
    let arrow = '';
    if (sortCol === i) arrow = `<span class="sort-arrow">${sortAsc ? '▲' : '▼'}</span>`;
    th.innerHTML = cfg.label + arrow;
    th.className = cfg.cls || '';
    th.onclick = () => { sortByCol(i); };
    headerRow.appendChild(th);
  });

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    headers.forEach(h => {
      const td = document.createElement('td');
      const cfg = COLUMN_CONFIG[h] || { format: v => v };
      td.className = cfg.cls || '';
      td.innerHTML = cfg.format(row[h], row);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  document.getElementById('row-count').textContent = `${rows.length} / ${allRows.length} rows`;
  renderStats(rows);
}

function sortByCol(i) {
  if (sortCol === i) { sortAsc = !sortAsc; }
  else { sortCol = i; sortAsc = true; }
  const key = headers[i];
  allRows.sort((a, b) => {
    let va = a[key], vb = b[key];
    const na = Number(va), nb = Number(vb);
    if (!isNaN(na) && !isNaN(nb)) { return sortAsc ? na - nb : nb - na; }
    return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
  renderTable(getFiltered());
}

function populateYearFilter() {
  const years = [...new Set(allRows.map(r => r.fiscal_year))].sort();
  const sel = document.getElementById('filter-year');
  sel.innerHTML = '<option value="">All Fiscal Years</option>';
  years.forEach(y => {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = 'FY' + y;
    sel.appendChild(opt);
  });
}

async function fetchData() {
  const loading = document.getElementById('loading');
  const table = document.getElementById('data-table');
  const error = document.getElementById('error');

  loading.style.display = 'block';
  table.style.display = 'none';
  error.style.display = 'none';

  try {
    const res = await fetch(CSV_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const parsed = parseCSV(text);
    headers = parsed.headers;
    allRows = parsed.rows;

    populateYearFilter();
    renderTable(getFiltered());

    loading.style.display = 'none';
    table.style.display = 'table';

    const now = new Date().toLocaleString();
    document.getElementById('status').innerHTML = '<span class="dot dot-green"></span>Live';
    document.getElementById('last-update').textContent = 'Updated: ' + now;
    document.getElementById('footer').textContent = `Data source: USASpending.gov API → governance_matrix.csv | Last fetch: ${now} | Auto-refresh every hour`;
  } catch (e) {
    loading.style.display = 'none';
    error.style.display = 'block';
    error.textContent = 'Failed to load data: ' + e.message;
    document.getElementById('status').innerHTML = '<span class="dot dot-red"></span>Error';
  }
}

document.getElementById('search').addEventListener('input', () => renderTable(getFiltered()));
document.getElementById('filter-year').addEventListener('change', () => renderTable(getFiltered()));

fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
