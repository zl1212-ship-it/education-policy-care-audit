name: Update Governance Matrix

on:
  # Hourly schedule disabled: the dataset backing the manuscript is frozen and
  # versioned (see tag paper-data-v1). Re-run manually when a deliberate refresh
  # is wanted. Re-enabling the cron will silently overwrite the canonical CSV.
  #   schedule:
  #     - cron: "0 * * * *"
  workflow_dispatch:       # manual trigger only

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python build_matrix.py

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add governance_matrix.csv
          git diff --cached --quiet || git commit -m "chore: update governance matrix $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
